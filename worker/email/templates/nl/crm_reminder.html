<!DOCTYPE html>
<html lang="nl">
<head><meta charset="UTF-8"><title>Herinnering opvolging — Far East Property Management</title></head>
<body style="font-family:sans-serif;max-width:600px;margin:0 auto;padding:24px;color:#222;">
  <h1 style="font-size:22px;margin-bottom:8px;">Herinnering opvolging</h1>
  <p>Hoi {{ assignee_name }},</p>
  <p>U heeft een opvolgtaak die <strong>{{ due_label }}</strong> is.</p>

  <table style="border-collapse:collapse;font-size:14px;margin:16px 0;">
    <tr><td style="padding:4px 16px 4px 0;color:#666;">Lead</td><td>{{ contact_name }} ({{ lead_email }})</td></tr>
    <tr><td style="padding:4px 16px 4px 0;color:#666;">Fase</td><td>{{ stage }}</td></tr>
    <tr><td style="padding:4px 16px 4px 0;color:#666;">Vervaldatum</td><td>{{ due_at }}</td></tr>
    {% if note %}<tr><td style="padding:4px 16px 4px 0;color:#666;">Notitie</td><td>{{ note }}</td></tr>{% endif %}
  </table>

  <hr style="border:none;border-top:1px solid #eee;margin:32px 0;">
  <p style="color:#999;font-size:12px;">Far East Property Management — CRM</p>
</body>
</html>
