# redis.conf — production
# Password is injected via REDIS_PASSWORD env var in docker-compose.yml
# using the --requirepass flag. Do not hardcode it here.

# Memory limit — prevent Redis consuming all available RAM
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence — survive restarts
appendonly yes
appendfsync everysec

# Disable dangerous commands
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command DEBUG ""
rename-command CONFIG ""

# Connection
tcp-keepalive 300
timeout 0

# Logging
loglevel notice
logfile ""
