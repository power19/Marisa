# redis.conf — production hardened config
# Far East Property Management
#
# SECURITY: password is injected via --requirepass $REDIS_PASSWORD in
# docker-compose.yml command. Do not hardcode it here.
#
# SECURITY: Run container as non-root user (user: "999:999" in compose).
# If Redis runs as root, CONFIG SET + SAVE can write files anywhere on
# the host — enabling SSH key injection, cron backdoors, and web shells.

# --- Network binding ---
# Bind only to localhost inside the container.
# Docker networking handles container-to-container communication.
bind 127.0.0.1

# --- Memory limit ---
# Prevent Redis from consuming all available RAM and crashing the host.
maxmemory 256mb
maxmemory-policy allkeys-lru

# --- Persistence (AOF) ---
# Survive container restarts — preserves rate limit counters and tokens.
appendonly yes
appendfsync everysec
# Do NOT use appendfsync always — too slow under load.

# --- Disable dangerous commands (CRITICAL) ---
#
# CONFIG + SAVE: Used in RCE attacks to write arbitrary files to the filesystem
# (SSH key injection, cron backdoors, web shells). Must be disabled.
rename-command CONFIG        ""
rename-command SAVE          ""
rename-command BGSAVE        ""
rename-command BGREWRITEAOF  ""
#
# FLUSHALL / FLUSHDB: Wipe entire dataset. No legitimate use in this stack.
rename-command FLUSHALL      ""
rename-command FLUSHDB       ""
#
# DEBUG: Enables low-level debug operations. No legitimate production use.
rename-command DEBUG         ""
#
# EVAL: Executes Lua scripts. CVE-2022-0543 demonstrated Lua sandbox escape
# leading to arbitrary OS command execution. Not used in this stack.
rename-command EVAL          ""
rename-command EVALSHA       ""
#
# SLAVEOF / REPLICAOF: Replication commands. Not used; prevent abuse.
rename-command SLAVEOF       ""
rename-command REPLICAOF     ""

# --- Connection settings ---
tcp-keepalive 300
timeout 300
tcp-backlog 128

# --- Logging ---
loglevel notice
logfile ""

# --- Slow log (for debugging performance, not a security setting) ---
slowlog-log-slower-than 10000
slowlog-max-len 128
