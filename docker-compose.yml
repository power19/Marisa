services:
  # ─── Backing services (always up) ───────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [realty_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    command: redis-server /etc/redis/redis.conf
    user: "999:999"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/etc/redis/redis.conf:ro
    networks: [realty_net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Directus CMS ───────────────────────────────────────────────────────────

  directus:
    image: directus/directus:11.2.2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      # Auth
      SECRET: ${DIRECTUS_SECRET}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL}
      # R2 object storage (S3-compatible)
      STORAGE_LOCATIONS: r2
      STORAGE_R2_DRIVER: s3
      STORAGE_R2_KEY: ${R2_ACCESS_KEY_ID}
      STORAGE_R2_SECRET: ${R2_SECRET_ACCESS_KEY}
      STORAGE_R2_BUCKET: ${R2_BUCKET_NAME}
      STORAGE_R2_ENDPOINT: ${R2_ENDPOINT}
      STORAGE_R2_REGION: auto
      STORAGE_R2_ACL: private
      # Redis — rate limiting + cache
      # Build URL inline: .env files don't interpolate variables, so REDIS_URL
      # with ${REDIS_PASSWORD} inside would be treated as a literal string.
      RATE_LIMITER_ENABLED: "true"
      RATE_LIMITER_STORE: redis
      RATE_LIMITER_REDIS: "redis://:${REDIS_PASSWORD}@redis:6379"
      CACHE_ENABLED: "true"
      CACHE_STORE: redis
      CACHE_REDIS: "redis://:${REDIS_PASSWORD}@redis:6379"
      # CORS
      CORS_ENABLED: "true"
      CORS_ORIGIN: ${DIRECTUS_CORS_ORIGIN}
      # Security
      LOG_LEVEL: warn
      FILES_MAX_UPLOAD_SIZE: 25mb
      IMPORT_IP_DENY_LIST: "0.0.0.0/8,10.0.0.0/8,100.64.0.0/10,127.0.0.0/8,169.254.0.0/16,172.16.0.0/12,192.0.0.0/24,192.168.0.0/16,198.18.0.0/15,198.51.100.0/24,203.0.113.0/24,224.0.0.0/4,240.0.0.0/4"
    volumes:
      - ./directus/extensions:/directus/extensions
      - ./directus/schema:/directus/schema
      - ./directus/seed:/directus/seed
    networks: [realty_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8055/server/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Reverse proxy ──────────────────────────────────────────────────────────

  caddy:
    image: caddy:2.8-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
      CADDY_ADMIN_EMAIL: ${CADDY_ADMIN_EMAIL}
      CADDY_ADMIN_IPS: ${CADDY_ADMIN_IPS}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    networks: [realty_net]
    restart: unless-stopped
    depends_on:
      directus:
        condition: service_healthy

  # ─── Application services (enable with --profile web|pm|worker) ─────────────

  web:
    build: ./web
    profiles: [web]
    environment:
      NEXT_PUBLIC_DIRECTUS_URL: ${NEXT_PUBLIC_DIRECTUS_URL}
      DIRECTUS_INTERNAL_URL: http://directus:8055
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      DIRECTUS_SERVER_TOKEN: ${DIRECTUS_SERVER_TOKEN}
      PM_INTERNAL_URL: http://pm:8000
      NEXT_PUBLIC_PM_URL: ${NEXT_PUBLIC_PM_URL}
      NEXT_PUBLIC_R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    networks: [realty_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    depends_on:
      directus:
        condition: service_healthy

  pm:
    build: ./pm
    profiles: [pm]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DIRECTUS_SECRET: ${DIRECTUS_SECRET}
      DIRECTUS_PUBLIC_URL: ${DIRECTUS_PUBLIC_URL}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    networks: [realty_net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: ./worker
    profiles: [worker]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DIRECTUS_PUBLIC_URL: ${DIRECTUS_PUBLIC_URL}
      DIRECTUS_SECRET: ${DIRECTUS_SECRET}
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      EMAIL_PROVIDER: ${EMAIL_PROVIDER}
      EMAIL_API_KEY: ${EMAIL_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_CENTRAL_INBOX: ${EMAIL_CENTRAL_INBOX}
    networks: [realty_net]
    healthcheck:
      test: ["CMD", "python", "-c", "import celery; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ─── Nightly backup ──────────────────────────────────────────────────────────

  backup:
    image: postgres:16-alpine
    profiles: [backup]
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_ENDPOINT: ${R2_ENDPOINT}
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
    networks: [realty_net]
    entrypoint: ["/bin/sh", "/backup.sh"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  caddy_logs:

networks:
  realty_net:
    driver: bridge
